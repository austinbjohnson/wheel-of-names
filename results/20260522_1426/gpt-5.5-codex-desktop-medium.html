<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise Zone PM Wheel</title>
    <style>
:root {
  --zapier-orange: #ff4f00;
  --zapier-black: #201515;
  --zapier-cream: #fff3e6;
  --zapier-blue: #3d5afe;
  --zapier-green: #00a887;
  --zapier-yellow: #ffd95a;
  --ink: #201515;
  --muted: rgba(32, 21, 21, 0.64);
  --glass: rgba(255, 255, 255, 0.42);
  --glass-strong: rgba(255, 255, 255, 0.68);
  --stroke: rgba(255, 255, 255, 0.64);
  --shadow: 0 28px 90px rgba(54, 36, 18, 0.18);
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  color: var(--ink);
  font-family: ui-rounded, "Avenir Next", "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 18% 14%, rgba(255, 79, 0, 0.24), transparent 28%),
    radial-gradient(circle at 84% 8%, rgba(61, 90, 254, 0.2), transparent 26%),
    radial-gradient(circle at 86% 88%, rgba(0, 168, 135, 0.24), transparent 30%),
    linear-gradient(135deg, #fffaf4 0%, #f4efe7 48%, #fff6ed 100%);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(32, 21, 21, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(32, 21, 21, 0.035) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.74), transparent);
}

button,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  width: min(1500px, calc(100vw - 36px));
  min-height: 100vh;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(330px, 420px);
  gap: 24px;
  align-items: center;
  padding: 28px 0;
}

.wheel-stage,
.control-panel,
.dialog-glass {
  position: relative;
  border: 1px solid var(--stroke);
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.23)),
    rgba(255, 255, 255, 0.22);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(26px) saturate(1.34);
  -webkit-backdrop-filter: blur(26px) saturate(1.34);
  overflow: hidden;
}

.wheel-stage {
  min-height: calc(100vh - 56px);
  border-radius: 36px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  align-items: center;
  justify-items: center;
  padding: 26px;
}

.wheel-stage::after,
.control-panel::after,
.dialog-glass::after {
  content: "";
  position: absolute;
  inset: 1px;
  pointer-events: none;
  border-radius: inherit;
  background: linear-gradient(120deg, rgba(255, 255, 255, 0.52), transparent 18%, transparent 72%, rgba(255, 255, 255, 0.32));
}

.brand-mark {
  justify-self: start;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.54);
  border: 1px solid rgba(255, 255, 255, 0.72);
  font-weight: 800;
  letter-spacing: 0;
}

.brand-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--zapier-orange);
  box-shadow:
    12px 0 0 var(--zapier-orange),
    6px 10px 0 var(--zapier-orange),
    6px -10px 0 var(--zapier-orange);
  transform: scale(0.66);
}

.stage-copy {
  position: absolute;
  top: 28px;
  text-align: center;
  pointer-events: none;
}

.eyebrow {
  margin: 0 0 6px;
  color: var(--zapier-orange);
  font-size: 0.76rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h1,
h2,
h3 {
  margin: 0;
  letter-spacing: 0;
}

h1 {
  font-size: clamp(2.25rem, 5vw, 5.2rem);
  line-height: 0.9;
}

h2 {
  font-size: 1.38rem;
}

h3 {
  font-size: 1rem;
}

.wheel-wrap {
  position: relative;
  width: min(72vh, 78vw, 760px);
  aspect-ratio: 1;
  display: grid;
  place-items: center;
  margin-top: 54px;
}

.wheel-wrap::before {
  content: "";
  position: absolute;
  inset: -18px;
  border-radius: 50%;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.12)),
    radial-gradient(circle at 36% 22%, rgba(255, 255, 255, 0.9), transparent 26%);
  border: 1px solid rgba(255, 255, 255, 0.8);
  box-shadow:
    0 32px 90px rgba(32, 21, 21, 0.2),
    inset 0 2px 12px rgba(255, 255, 255, 0.9),
    inset 0 -28px 70px rgba(255, 79, 0, 0.11);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
}

#wheel {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 18px 40px rgba(32, 21, 21, 0.22));
}

.pointer {
  position: absolute;
  z-index: 4;
  right: -10px;
  top: 50%;
  width: 72px;
  height: 42px;
  transform: translateY(-50%);
  background: linear-gradient(90deg, #201515, #4e3125);
  clip-path: polygon(0 50%, 100% 0, 86% 50%, 100% 100%);
  filter: drop-shadow(0 8px 12px rgba(32, 21, 21, 0.26));
}

.spin-button {
  position: absolute;
  z-index: 3;
  width: 148px;
  aspect-ratio: 1;
  border: 1px solid rgba(255, 255, 255, 0.72);
  border-radius: 50%;
  color: white;
  background:
    radial-gradient(circle at 32% 22%, rgba(255, 255, 255, 0.38), transparent 22%),
    linear-gradient(145deg, #ff7a2f, var(--zapier-orange) 52%, #bd3300);
  box-shadow:
    0 22px 42px rgba(255, 79, 0, 0.38),
    inset 0 1px 0 rgba(255, 255, 255, 0.52),
    inset 0 -12px 24px rgba(32, 21, 21, 0.2);
  font-size: 1.42rem;
  font-weight: 950;
  transition: transform 180ms ease, filter 180ms ease;
}

.spin-button:hover {
  transform: scale(1.04);
  filter: saturate(1.08);
}

.spin-button:disabled {
  cursor: wait;
  transform: scale(0.98);
  filter: grayscale(0.2);
}

.result-strip {
  z-index: 1;
  width: min(620px, 100%);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, 0.7);
  background: rgba(255, 255, 255, 0.42);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

.result-label,
.input-label {
  color: var(--muted);
  font-size: 0.88rem;
}

.control-panel {
  min-height: calc(100vh - 56px);
  border-radius: 28px;
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.top-section,
.history-header,
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.count-pill {
  flex: 0 0 auto;
  padding: 8px 11px;
  border-radius: 999px;
  background: var(--zapier-black);
  color: white;
  font-size: 0.82rem;
  font-weight: 850;
}

.input-label {
  line-height: 1.4;
}

textarea {
  position: relative;
  z-index: 1;
  flex: 1;
  min-height: 290px;
  width: 100%;
  resize: none;
  border: 1px solid rgba(255, 255, 255, 0.76);
  border-radius: 20px;
  outline: none;
  padding: 16px 17px;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.52);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
  line-height: 1.55;
}

textarea:focus {
  border-color: rgba(255, 79, 0, 0.62);
  box-shadow: 0 0 0 4px rgba(255, 79, 0, 0.13);
}

.button-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

.tool-button,
.history-header button {
  position: relative;
  z-index: 1;
  min-height: 42px;
  border: 1px solid rgba(255, 255, 255, 0.72);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.54);
  color: var(--ink);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
  font-weight: 850;
  transition: transform 160ms ease, background 160ms ease;
}

.tool-button:hover,
.history-header button:hover {
  transform: translateY(-1px);
  background: rgba(255, 255, 255, 0.76);
}

.tool-button.primary {
  color: white;
  background: var(--zapier-orange);
}

.tool-button.danger {
  color: #8f2600;
}

.settings-row {
  align-items: flex-start;
}

.toggle {
  z-index: 1;
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 8px;
  align-items: center;
  width: 50%;
  color: var(--muted);
  font-size: 0.84rem;
  line-height: 1.28;
}

.toggle input {
  position: absolute;
  opacity: 0;
}

.toggle span {
  width: 44px;
  height: 25px;
  border-radius: 999px;
  background: rgba(32, 21, 21, 0.16);
  border: 1px solid rgba(255, 255, 255, 0.82);
  transition: background 180ms ease;
}

.toggle span::before {
  content: "";
  display: block;
  width: 19px;
  height: 19px;
  margin: 2px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 2px 8px rgba(32, 21, 21, 0.22);
  transition: transform 180ms ease;
}

.toggle input:checked + span {
  background: var(--zapier-orange);
}

.toggle input:checked + span::before {
  transform: translateX(19px);
}

.history-panel {
  z-index: 1;
  min-height: 166px;
  padding: 14px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.38);
  border: 1px solid rgba(255, 255, 255, 0.68);
}

.history-header {
  margin-bottom: 10px;
}

.history-header button {
  min-height: 32px;
  padding: 0 10px;
  font-size: 0.78rem;
}

#historyList {
  display: grid;
  gap: 8px;
  margin: 0;
  padding-left: 22px;
  color: var(--muted);
}

#historyList li::marker {
  color: var(--zapier-orange);
  font-weight: 900;
}

.winner-dialog {
  width: min(560px, calc(100vw - 32px));
  padding: 0;
  border: 0;
  background: transparent;
}

.winner-dialog::backdrop {
  background: rgba(32, 21, 21, 0.22);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.dialog-glass {
  border-radius: 30px;
  padding: 34px;
  text-align: center;
}

.dialog-glass h2 {
  margin-bottom: 24px;
  color: var(--zapier-black);
  font-size: clamp(2rem, 7vw, 4.5rem);
  line-height: 0.95;
}

.dialog-actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

#confetti {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 20;
}

@media (max-width: 1080px) {
  .app-shell {
    grid-template-columns: 1fr;
    align-items: start;
  }

  .wheel-stage,
  .control-panel {
    min-height: auto;
  }

  .wheel-wrap {
    width: min(78vw, 680px);
  }
}

@media (max-width: 680px) {
  .app-shell {
    width: min(100vw - 20px, 1500px);
    padding: 10px 0;
    gap: 10px;
  }

  .wheel-stage,
  .control-panel {
    border-radius: 22px;
    padding: 16px;
  }

  .stage-copy {
    position: static;
    order: -1;
    margin-top: 12px;
  }

  .brand-mark {
    justify-self: center;
  }

  .wheel-wrap {
    width: min(86vw, 520px);
    margin-top: 20px;
  }

  .spin-button {
    width: 108px;
    font-size: 1.1rem;
  }

  .pointer {
    width: 52px;
    height: 32px;
    right: -8px;
  }

  .button-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .settings-row,
  .dialog-actions {
    display: grid;
    grid-template-columns: 1fr;
  }

  .toggle {
    width: 100%;
  }
}

</style>
  </head>
  <body>
    <main class="app-shell">
      <section class="wheel-stage" aria-label="Enterprise Zone PM picker">
        <div class="brand-mark" aria-hidden="true">
          <span class="brand-dot"></span>
          <span>Zapier</span>
        </div>

        <div class="stage-copy">
          <p class="eyebrow">Enterprise Zone</p>
          <h1>PM picker</h1>
        </div>

        <div class="wheel-wrap">
          <div class="pointer" aria-hidden="true"></div>
          <canvas id="wheel" width="920" height="920" aria-label="Wheel of Enterprise Zone PMs"></canvas>
          <button class="spin-button" id="spinButton" type="button">
            <span>Spin</span>
          </button>
        </div>

        <div class="result-strip" aria-live="polite">
          <span class="result-label">Last pick</span>
          <strong id="lastPick">Ready when you are</strong>
        </div>
      </section>

      <aside class="control-panel" aria-label="Wheel controls">
        <div class="panel-section top-section">
          <div>
            <p class="eyebrow">Names</p>
            <h2>Enterprise Zone PMs</h2>
          </div>
          <span class="count-pill" id="entryCount">0 entries</span>
        </div>

        <label class="input-label" for="entries">
          Add one person per line. Use the edit box to swap in the exact current roster.
        </label>
        <textarea id="entries" spellcheck="false"></textarea>

        <div class="button-grid">
          <button id="shuffleButton" class="tool-button" type="button">Shuffle</button>
          <button id="resetButton" class="tool-button" type="button">Reset</button>
          <button id="sortButton" class="tool-button" type="button">Sort</button>
          <button id="clearButton" class="tool-button danger" type="button">Clear</button>
        </div>

        <div class="settings-row">
          <label class="toggle">
            <input id="removeAfterWin" type="checkbox" />
            <span></span>
            Remove winner after spin
          </label>
          <label class="toggle">
            <input id="longSpin" type="checkbox" checked />
            <span></span>
            Dramatic spin
          </label>
        </div>

        <div class="history-panel">
          <div class="history-header">
            <h3>Pick history</h3>
            <button id="clearHistoryButton" type="button">Clear</button>
          </div>
          <ol id="historyList"></ol>
        </div>
      </aside>
    </main>

    <dialog id="winnerDialog" class="winner-dialog">
      <div class="dialog-glass">
        <p class="eyebrow">Selected</p>
        <h2 id="winnerName">Name</h2>
        <div class="dialog-actions">
          <button id="closeWinnerButton" class="tool-button" type="button">Keep spinning</button>
          <button id="removeWinnerButton" class="tool-button primary" type="button">Remove winner</button>
        </div>
      </div>
    </dialog>

    <canvas id="confetti" aria-hidden="true"></canvas>
    <script>
(() => {
const defaultEntries = [
  "Enterprise Zone PM - Account Management",
  "Enterprise Zone PM - Admin Controls",
  "Enterprise Zone PM - Asset Management",
  "Enterprise Zone PM - Governance",
  "Enterprise Zone PM - Identity",
  "Enterprise Zone PM - Platform Trust",
  "Enterprise Zone PM - Security",
  "Enterprise Zone PM - Teams"
];

const palette = ["#ff4f00", "#201515", "#3d5afe", "#00a887", "#ffd95a", "#fff3e6"];
const canvas = document.querySelector("#wheel");
const ctx = canvas.getContext("2d");
const confettiCanvas = document.querySelector("#confetti");
const confettiCtx = confettiCanvas.getContext("2d");
const entriesInput = document.querySelector("#entries");
const spinButton = document.querySelector("#spinButton");
const lastPick = document.querySelector("#lastPick");
const entryCount = document.querySelector("#entryCount");
const historyList = document.querySelector("#historyList");
const winnerDialog = document.querySelector("#winnerDialog");
const winnerName = document.querySelector("#winnerName");
const removeAfterWin = document.querySelector("#removeAfterWin");
const longSpin = document.querySelector("#longSpin");

let rotation = 0;
let spinning = false;
let currentWinner = "";
let history = [];
let confetti = [];

entriesInput.value = defaultEntries.join("\n");

function getEntries() {
  return entriesInput.value
    .split("\n")
    .map((entry) => entry.trim())
    .filter(Boolean);
}

function setEntries(entries) {
  entriesInput.value = entries.join("\n");
  render();
}

function secureRandom() {
  const values = new Uint32Array(1);
  crypto.getRandomValues(values);
  return values[0] / 2 ** 32;
}

function resizeConfetti() {
  const ratio = window.devicePixelRatio || 1;
  confettiCanvas.width = Math.floor(window.innerWidth * ratio);
  confettiCanvas.height = Math.floor(window.innerHeight * ratio);
  confettiCanvas.style.width = `${window.innerWidth}px`;
  confettiCanvas.style.height = `${window.innerHeight}px`;
  confettiCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
}

function drawWheel() {
  const entries = getEntries();
  const size = canvas.width;
  const center = size / 2;
  const radius = size * 0.45;
  const segmentAngle = (Math.PI * 2) / Math.max(entries.length, 1);

  ctx.clearRect(0, 0, size, size);
  ctx.save();
  ctx.translate(center, center);
  ctx.rotate(rotation);

  if (!entries.length) {
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 255, 255, 0.44)";
    ctx.fill();
    ctx.fillStyle = "#201515";
    ctx.font = "800 44px ui-rounded, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Add names", 0, 12);
    ctx.restore();
    return;
  }

  entries.forEach((entry, index) => {
    const start = index * segmentAngle;
    const end = start + segmentAngle;
    const color = palette[index % palette.length];

    const gradient = ctx.createRadialGradient(-radius * 0.28, -radius * 0.28, radius * 0.1, 0, 0, radius);
    gradient.addColorStop(0, soften(color, 0.42));
    gradient.addColorStop(0.62, color);
    gradient.addColorStop(1, darken(color, 0.18));

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, radius, start, end);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.72)";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.save();
    ctx.rotate(start + segmentAngle / 2);
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillStyle = color === "#201515" || color === "#3d5afe" || color === "#00a887" ? "#ffffff" : "#201515";
    ctx.font = `850 ${entries.length > 8 ? 22 : 28}px ui-rounded, sans-serif`;
    fitSegmentText(entry, radius - 38);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(0, 0, radius * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255, 255, 255, 0.72)";
  ctx.fill();
  ctx.strokeStyle = "rgba(255, 255, 255, 0.92)";
  ctx.lineWidth = 5;
  ctx.stroke();

  ctx.fillStyle = "#ff4f00";
  ctx.font = "950 54px ui-rounded, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Z", 0, 2);

  ctx.beginPath();
  ctx.arc(-radius * 0.22, -radius * 0.28, radius * 0.58, Math.PI * 1.1, Math.PI * 1.55);
  ctx.strokeStyle = "rgba(255, 255, 255, 0.34)";
  ctx.lineWidth = 20;
  ctx.lineCap = "round";
  ctx.stroke();

  ctx.restore();
}

function fitSegmentText(text, maxWidth) {
  let label = text;
  let nextLength = text.length - 1;
  while (ctx.measureText(label).width > maxWidth && nextLength > 8) {
    label = `${text.slice(0, nextLength)}...`;
    nextLength -= 1;
  }
  ctx.fillText(label, maxWidth, 0);
}

function soften(hex, amount) {
  return mix(hex, "#ffffff", amount);
}

function darken(hex, amount) {
  return mix(hex, "#000000", amount);
}

function mix(hex, target, amount) {
  const a = parseInt(hex.slice(1), 16);
  const b = parseInt(target.slice(1), 16);
  const ar = (a >> 16) & 255;
  const ag = (a >> 8) & 255;
  const ab = a & 255;
  const br = (b >> 16) & 255;
  const bg = (b >> 8) & 255;
  const bb = b & 255;
  const rr = Math.round(ar + (br - ar) * amount);
  const rg = Math.round(ag + (bg - ag) * amount);
  const rb = Math.round(ab + (bb - ab) * amount);
  return `rgb(${rr}, ${rg}, ${rb})`;
}

function render() {
  const entries = getEntries();
  entryCount.textContent = `${entries.length} ${entries.length === 1 ? "entry" : "entries"}`;
  spinButton.disabled = spinning || entries.length < 2;
  drawWheel();
}

function spin() {
  const entries = getEntries();
  if (spinning || entries.length < 2) return;

  spinning = true;
  render();

  const segmentAngle = (Math.PI * 2) / entries.length;
  const winnerIndex = Math.floor(secureRandom() * entries.length);
  const pointerAngle = 0;
  const current = normalize(rotation);
  const centerOfWinner = winnerIndex * segmentAngle + segmentAngle / 2;
  const turns = (longSpin.checked ? 7 : 4) + Math.floor(secureRandom() * 3);
  const target = turns * Math.PI * 2 + pointerAngle - centerOfWinner;
  const delta = target - current;
  const duration = longSpin.checked ? 5200 : 3200;
  const start = performance.now();
  const startRotation = rotation;

  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 4);
    rotation = startRotation + delta * eased;
    drawWheel();

    if (t < 1) {
      requestAnimationFrame(tick);
      return;
    }

    rotation = normalize(rotation);
    currentWinner = entries[winnerIndex];
    finishSpin(currentWinner);
  }

  requestAnimationFrame(tick);
}

function normalize(angle) {
  const full = Math.PI * 2;
  return ((angle % full) + full) % full;
}

function finishSpin(winner) {
  spinning = false;
  lastPick.textContent = winner;
  winnerName.textContent = winner;
  history.unshift(winner);
  history = history.slice(0, 10);
  renderHistory();
  burstConfetti();

  if (removeAfterWin.checked) {
    removeWinnerFromEntries(winner);
  }

  render();
  if (typeof winnerDialog.showModal === "function") {
    winnerDialog.showModal();
  }
}

function removeWinnerFromEntries(winner = currentWinner) {
  const entries = getEntries();
  const index = entries.indexOf(winner);
  if (index >= 0) {
    entries.splice(index, 1);
    setEntries(entries);
  }
}

function renderHistory() {
  historyList.innerHTML = "";
  history.forEach((name) => {
    const item = document.createElement("li");
    item.textContent = name;
    historyList.append(item);
  });
}

function shuffleEntries() {
  const entries = getEntries();
  for (let index = entries.length - 1; index > 0; index -= 1) {
    const next = Math.floor(secureRandom() * (index + 1));
    [entries[index], entries[next]] = [entries[next], entries[index]];
  }
  setEntries(entries);
}

function burstConfetti() {
  confetti = Array.from({ length: 150 }, () => ({
    x: window.innerWidth * (0.25 + secureRandom() * 0.5),
    y: window.innerHeight * 0.38,
    vx: (secureRandom() - 0.5) * 13,
    vy: -9 - secureRandom() * 11,
    gravity: 0.34 + secureRandom() * 0.12,
    size: 6 + secureRandom() * 11,
    angle: secureRandom() * Math.PI,
    spin: (secureRandom() - 0.5) * 0.34,
    color: palette[Math.floor(secureRandom() * palette.length)],
    life: 90 + secureRandom() * 45
  }));
  animateConfetti();
}

function animateConfetti() {
  confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  confetti.forEach((piece) => {
    piece.x += piece.vx;
    piece.y += piece.vy;
    piece.vy += piece.gravity;
    piece.angle += piece.spin;
    piece.life -= 1;

    confettiCtx.save();
    confettiCtx.translate(piece.x, piece.y);
    confettiCtx.rotate(piece.angle);
    confettiCtx.fillStyle = piece.color;
    confettiCtx.globalAlpha = Math.max(piece.life / 120, 0);
    confettiCtx.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.54);
    confettiCtx.restore();
  });

  confetti = confetti.filter((piece) => piece.life > 0 && piece.y < window.innerHeight + 40);
  if (confetti.length) requestAnimationFrame(animateConfetti);
}

entriesInput.addEventListener("input", render);
spinButton.addEventListener("click", spin);
document.querySelector("#shuffleButton").addEventListener("click", shuffleEntries);
document.querySelector("#resetButton").addEventListener("click", () => setEntries(defaultEntries));
document.querySelector("#sortButton").addEventListener("click", () => setEntries(getEntries().sort((a, b) => a.localeCompare(b))));
document.querySelector("#clearButton").addEventListener("click", () => setEntries([]));
document.querySelector("#clearHistoryButton").addEventListener("click", () => {
  history = [];
  renderHistory();
});
document.querySelector("#closeWinnerButton").addEventListener("click", () => winnerDialog.close());
document.querySelector("#removeWinnerButton").addEventListener("click", () => {
  removeWinnerFromEntries();
  winnerDialog.close();
});
window.addEventListener("resize", () => {
  resizeConfetti();
  render();
});

resizeConfetti();
render();
})();

</script>

</html>
